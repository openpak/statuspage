title: Openpak Status

buildFuture: true
languageCode: en
defaultContentLanguage: en
baseURL: https://status.openpak.org
enableGitInfo: true

params:
  categories:
    - name: main
      untitled: true

  systems:
    - name: Website
      description: The main website (openpak.org).
      category: main
    - name: API
      description: The backend service powering the website.
      category: main
    - name: CDN
      description: Content delivery network (dl.openpak.org).
      category: main
    - name: Build service
      description: Build service (build.openpak.org).
      category: main
    - name: Main repository server
      description: The main server managing uploads and acting as the backend to CDN (hub.openpak.org).
      category: main

  customTabs:
    - name: Website
      link: https://openpak.org

  dateFormat: January 2, 2006 at 15:04 UTC
  shortDateFormat: 15:04 UTC — Jan 2
  useRelativeTime: true
  skipSeconds: true
  enableLastMod: true
  incidentHistoryFormat: "none"
  disableIncidentHistory: false
  disableDarkMode: false
  useLargeHeaderDesign: true
  description: Please note that this page is updated manually. Notices regarding major interruptions or scheduled maintenance will be posted here.
  disableComplexCalculations: false
  incidentPostsPerPage: 10
  ok: "#008000"
  disrupted: "#cc4400"
  down: "#e60000"
  notice: "#24478f"
  alwaysKeepBrandColor: true
  googleAnalytics: UA-00000000-1

# These options affect the core of cState.
# Please do not change them if you do not
# know what you are doing.
theme: cstate

preserveTaxonomyNames: true

taxonomies:
  affected: affected

outputs:
  page:
    - html
    - json
  section:
    - html
    - json
    - rss
  home:
    - html
    - json
    - rss
    - svg
  term:
    - html
    - json
    - rss
    - svg

outputFormats:
  svg:
    isPlainText: true
    mediaType: image/svg+xml
